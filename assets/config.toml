# ~/.config/apatite/config.toml
# Apatite: Unified theme applier for Linux desktops. (Base16 schema)

version = 1

[theme]
# How to choose a theme:
# - "preset"         : use a Base16 preset name (internal or user)
# - "wallpaper"      : extract Base16 (light/dark) from a wallpaper
# - "custom"  : provide Base16 colors directly in config
mode = "preset"
preference = "dark"  # "light" or "dark"

[theme.preset]
dark = "apatite"
light = "apatite"

[theme.wallpaper]
path = "~/Pictures/wallpapers/current_wallpaper.jpg"

[theme.custom.dark]
base00 = "#282c34"
base01 = "#353b45"
base02 = "#3e4451"
base03 = "#545862"
base04 = "#565c64"
base05 = "#abb2bf"
base06 = "#b6bdca"
base07 = "#c8ccd4"
base08 = "#e06c75"
base09 = "#d19a66"
base0A = "#e5c07b"
base0B = "#98c379"
base0C = "#56b6c2"
base0D = "#61afef"
base0E = "#c678dd"
base0F = "#be5046"

[theme.custom.light]
base00 = "#fafafa"
base01 = "#f0f0f1"
base02 = "#e5e5e6"
base03 = "#a0a1a7"
base04 = "#696c77"
base05 = "#383a42"
base06 = "#202227"
base07 = "#090a0b"
base08 = "#ca1243"
base09 = "#d75f00"
base0A = "#c18401"
base0B = "#50a14f"
base0C = "#0184bc"
base0D = "#4078f2"
base0E = "#a626a4"
base0F = "#986801"

# ---------------------------------------------------------
# Fonts and assets
# ---------------------------------------------------------

[fonts]
[fonts.interface]
family = "Noto Sans CJK JP"
size = 12

[fonts.serif]
family = "Noto Serif CJK JP"
size = 12

[fonts.monospace]
family = "HackGen"
size = 11

[fonts.misc]
antialias = true
hinting = true
hintstyle = "hintmedium"
rgba = "none"
autohint = true
lcdfilter = true
dpi = 102

[assets]
[assets.icon]
name = "Papirus-Dark"

[assets.cursor]
name = "Breeze_Snow"
size = 24

# ---------------------------------------------------------
# Apply targets (optional)
# ---------------------------------------------------------
# Toggle per target to skip applying specific stacks when testing.

[targets]
gtk2 = true
gtk3 = true
gtk4 = true
qt5 = true
qt6 = true
fontconfig = true
xsettingsd = true
