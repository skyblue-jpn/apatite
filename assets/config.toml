# ~/.config/apatite/config.toml
# Apatite: Unified theme applier for Linux desktops.

[theme]
# How to choose a theme:
# - "preset"    : use an existing KDE color scheme (.colors)
# - "wallpaper" : extract a Material You–style palette from [theme.wallpaper].path
# - "custom"    : build a palette from the colors defined in [theme.custom]
mode = "custom"

# System-wide color preference ("dark" or "light")
# Used for GTK / browser prefer-dark alignment
preference = "dark"

# ---------------------------------------------------------
# Per-mode settings (only the selected mode section is read)
# ---------------------------------------------------------

[theme.preset]
# Theme file name used when mode = "preset"
# Searched under ~/.local/share/color-schemes/ or /usr/share/color-schemes/
name = "BreezeDark"

[theme.wallpaper]
# Wallpaper path used when mode = "wallpaper"
path = "~/Pictures/wallpapers/current_wallpaper.jpg"

[theme.custom]
[theme.custom.dark]
primary = "#a6e22e"
on_primary = "#272822"
secondary = "#66d9ef"
on_secondary = "#272822"
tertiary = "#f92672"
on_tertiary = "#272822"
error = "#f92672"
on_error = "#272822"
surface = "#272822"
on_surface = "#f8f8f2"
hover = "#3a3a32"
on_hover = "#f8f8f2"
surface_variant = "#3e3d32"
on_surface_variant = "#a6e22e"
outline = "#75715e"
shadow = "#272822"

[theme.custom.light]
primary = "#a6e22e"
on_primary = "#f8f8f2"
secondary = "#66d9ef"
on_secondary = "#f8f8f2"
tertiary = "#f92672"
on_tertiary = "#f8f8f2"
error = "#f92672"
on_error = "#f8f8f2"
surface = "#f8f8f2"
on_surface = "#272822"
hover = "#e6e1dc"
on_hover = "#272822"
surface_variant = "#e6e1dc"
on_surface_variant = "#272822"
outline = "#a6e22e"
shadow = "#d8d8d8"

# Reference: https://github.com/noctalia-dev/noctalia-shell/tree/8344f25d5ab71ed777ec3fbccca897a1c3f6a245/Scripts/python/src/theming

# ---------------------------------------------------------
# Fonts and assets
# ---------------------------------------------------------

[fonts]
[fonts.interface]
family = "Noto Sans CJK JP"
size = 12

[fonts.serif]
family = "Noto Serif CJK JP"
size = 12

[fonts.monospace]
family = "HackGen"
size = 11

[fonts.misc]
antialias = true
hinting = true
hintstyle = "hintmedium"
rgba = "none"
autohint = true
lcdfilter = true
dpi = 102

[assets]
[assets.icon]
name = "Papirus-Dark"

[assets.cursor]
name = "Breeze_Snow"
size = 24

# ---------------------------------------------------------
# Apply targets (optional)
# ---------------------------------------------------------
# Toggle per target to skip applying specific stacks when testing.

[targets]
gtk2 = true
gtk3 = true
gtk4 = true
qt5 = true
qt6 = true
kdeglobals = true
fontconfig = true
xsettingsd = true
