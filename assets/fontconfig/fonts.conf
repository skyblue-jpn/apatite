# ~/.config/fontconfig/fonts.conf
# This file was generated by Apatite.

<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <match target="font">
        <edit name="antialias" mode="assign">
            <bool>{{fonts.misc.antialias}}</bool>
        </edit>
        <edit name="hinting" mode="assign">
            <bool>{{fonts.misc.hinting}}</bool>
        </edit>
        <edit name="hintstyle" mode="assign">
            <const>{{fonts.misc.hintstyle}}</const>
        </edit>
        <edit name="rgba" mode="assign">
            <const>{{fonts.misc.rgba}}</const>
        </edit>
        <edit name="autohint" mode="assign">
            <bool>{{fonts.misc.autohint}}</bool>
        </edit>
        <edit name="lcdfilter" mode="assign">
            <const>{{fonts.misc.lcdfilter}}</const>
        </edit>
        <edit name="dpi" mode="assign">
            <double>{{fonts.misc.dpi}}</double>
        </edit>
    </match>
    <match target="font">
        <test name="weight" compare="more">
            <const>medium</const>
        </test>
        <edit name="autohint" mode="assign">
            <bool>true</bool>
        </edit>
    </match>
    <alias>
      <family>serif</family>
      <prefer>
        <family>{{fonts.serif.family}}</family>
      </prefer>
    </alias>
    <alias>
      <family>sans-serif</family>
      <prefer>
        <family>{{fonts.interface.family}}</family>
      </prefer>
    </alias>
    <alias>
      <family>monospace</family>
      <prefer>
        <family>{{fonts.monospace.family}}</family>
      </prefer>
    </alias>
    <alias>
      <family>system-ui</family>
      <prefer>
        <family>{{fonts.interface.family}}</family>
      </prefer>
    </alias>
</fontconfig>
